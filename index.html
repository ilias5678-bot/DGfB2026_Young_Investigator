<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGfB 2026 Ranking</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; line-height: 1.4; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; overflow: hidden; }
        .banner { width: 100%; height: auto; display: block; }
        .content { padding: 20px; }
        h2 { margin: 10px 0 5px; color: #1a1a1a; text-align: center; font-size: 1.3rem; }
        .subtitle { color: #666; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        .section-title { background: #e2e8f0; padding: 8px; border-radius: 5px; margin: 20px 0 10px; font-weight: bold; font-size: 0.9rem; color: #1e293b; }
        label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.85rem; color: #374151; }
        select, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .rank-top { border-left: 5px solid #ffd700; padding-left: 10px; margin-bottom: 10px; }
        .rank-mid { border-left: 5px solid #94a3b8; padding-left: 10px; margin-bottom: 10px; }
        button { background: #005596; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; padding: 15px; transition: 0.3s; }
        button:disabled { background: #9ca3af; cursor: not-allowed; opacity: 0.6; }
        .hidden { display: none; }
        .success { text-align: center; padding: 40px 20px; }
        .already-voted { color: #dc2626; text-align: center; font-weight: bold; padding: 20px; background: #fee2e2; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="formBox">
    <img src="https://biomechanik-kongress.de/wp-content/uploads/sites/26/2025/04/DGfB-banner-final-version.png" alt="Banner" class="banner">
    <div class="content" id="mainContent">
        <h2>Young Investigator Award</h2>
        <p class="subtitle">1. Platz = 6 Pkt, 6. Platz = 1 Pkt</p>
        <form id="votingForm">
            <div class="section-title">Ihre Bewertung</div>
            <div class="rank-top"><label>1. Platz (6 Pkt)</label><select id="p1" class="vote-select" required></select></div>
            <div class="rank-top"><label>2. Platz (5 Pkt)</label><select id="p2" class="vote-select" required></select></div>
            <div class="rank-top"><label>3. Platz (4 Pkt)</label><select id="p3" class="vote-select" required></select></div>
            <div class="rank-mid"><label>4. Platz (3 Pkt)</label><select id="p4" class="vote-select" required></select></div>
            <div class="rank-mid"><label>5. Platz (2 Pkt)</label><select id="p5" class="vote-select" required></select></div>
            <div class="rank-mid"><label>6. Platz (1 Pkt)</label><select id="p6" class="vote-select" required></select></div>
            <button type="submit" id="submitBtn" disabled>Ranking absenden</button>
        </form>
    </div>
</div>

<div class="card hidden success" id="successBox">
    <div style="font-size: 50px; color: #10b981; margin-bottom: 20px;">✓</div>
    <h2>Vielen Dank!</h2>
    <p>Ihre Stimme wurde erfolgreich gezählt.</p>
</div>

<script>
    const vortraege = [
        "JONAS EBBECKE", "JONAS WALTER METZGER", "LEA MARIE-SOPHIE CORDES", 
        "MARCEL SIMON REICH", "ALEXANDER WEISS", "KILIAN RICHTHOFER"
    ];

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz9AAaspE_PeCICzwJV8Rd5DCh4FlXxhmaTYfLz-sAheocdXTnZQvcB3_74h6NvxK8/exec";
    const VOTE_KEY = "dgfb_2026_final_vote"; // Eindeutiger Schlüssel für die Sperre

    const selects = document.querySelectorAll('.vote-select');
    const submitBtn = document.getElementById('submitBtn');
    const mainContent = document.getElementById('mainContent');

    function init() {
        // 1. Prüfen, ob bereits abgestimmt wurde
        if (localStorage.getItem(VOTE_KEY)) {
            showAlreadyVoted();
            return;
        }

        // 2. Dropdowns befüllen
        selects.forEach(select => {
            select.innerHTML = '<option value="">Wählen...</option>';
            vortraege.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.text = v;
                select.appendChild(opt);
            });
            select.addEventListener('change', updateDropdowns);
        });
    }

    function showAlreadyVoted() {
        mainContent.innerHTML = `
            <h2>Hinweis</h2>
            <div class="already-voted">Sie haben bereits abgestimmt.</div>
            <p style="text-align:center; font-size: 0.85rem; color: #666; margin-top: 15px;">
                Pro Gerät ist nur eine Teilnahme am Young Investigator Award Voting vorgesehen.
            </p>
        `;
    }

    function updateDropdowns() {
        const selectedValues = Array.from(selects).map(s => s.value).filter(v => v !== "");
        selects.forEach(select => {
            const currentValue = select.value;
            Array.from(select.options).forEach(option => {
                if (option.value === "") return;
                option.disabled = selectedValues.includes(option.value) && option.value !== currentValue;
                option.style.display = option.disabled ? "none" : "block";
            });
        });
        submitBtn.disabled = selectedValues.length !== 6;
    }

    document.getElementById('votingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Wird gesendet...";

        const results = {};
        vortraege.forEach(v => results[v] = 0);
        
        results[document.getElementById('p1').value] = 6;
        results[document.getElementById('p2').value] = 5;
        results[document.getElementById('p3').value] = 4;
        results[document.getElementById('p4').value] = 3;
        results[document.getElementById('p5').value] = 2;
        results[document.getElementById('p6').value] = 1;

        const payload = {
            timestamp: new Date().toLocaleString('de-DE'),
            ...results
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            // SPERRE SETZEN
            localStorage.setItem(VOTE_KEY, "true");
            document.getElementById('formBox').classList.add('hidden');
            document.getElementById('successBox').classList.remove('hidden');
        }).catch(() => {
            alert("Fehler beim Senden. Bitte versuchen Sie es erneut.");
            submitBtn.disabled = false;
        });
    });

    init();
</script>
</body>
</html>
